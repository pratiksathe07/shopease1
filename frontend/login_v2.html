<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopEase - Sign In</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f5f5f5;
      color: #333;
      display: flex;
      flex-direction: column;
    }

    /* Header — matches user_v4 */
    header {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav {
      max-width: 1300px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      gap: 20px;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: 43%;
    }

    .logo-img {
      height: 40px;
      width: 40px;
      object-fit: contain;
      border-radius: 6px;
      background: #eee;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-tag {
      color: #888;
      font-size: .9rem;
    }

    /* Main card */
    .wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .main {
      width: 100%;
      max-width: 900px;
      min-height: 520px;
      display: flex;
      border-radius: 15px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.18);
    }

    /* Left form */
    .left {
      width: 55%;
      padding: 50px 45px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand-mini {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 25px;
    }

    .brand-mini img {
      height: 42px;
      width: 42px;
      object-fit: contain;
    }

    .brand-mini span {
      font-size: 1.3rem;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 {
      font-size: 1.7rem;
      margin-bottom: 6px;
      color: #222;
    }

    .sub {
      color: #888;
      font-size: .9rem;
      margin-bottom: 22px;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      margin: 8px 0;
      border: 2px solid #eee;
      border-radius: 10px;
      outline: none;
      font-size: .95rem;
      transition: border-color .2s;
      background: #fafafa;
    }

    input:focus,
    select:focus {
      border-color: #667eea;
      background: #fff;
    }

    button.primary {
      margin-top: 18px;
      padding: 13px;
      width: 100%;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-size: .95rem;
      font-weight: 600;
      letter-spacing: .5px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(102, 126, 234, 0.35);
      transition: transform .15s, box-shadow .2s;
    }

    button.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(102, 126, 234, 0.45);
    }

    .toggle {
      margin-top: 16px;
      text-align: center;
      font-size: .88rem;
      color: #666;
    }

    .toggle span {
      color: #667eea;
      font-weight: 600;
      cursor: pointer;
    }

    .toggle span:hover {
      text-decoration: underline;
    }

    /* Right panel */
    .right {
      width: 45%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 30px;
      text-align: center;
    }

    .right img {
      width: 60%;
      max-width: 220px;
      background: white;
      padding: 20px;
      border-radius: 50%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      margin-bottom: 25px;
    }

    .right h3 {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .right p {
      opacity: .9;
      font-size: .92rem;
      line-height: 1.5;
    }

    .hidden {
      display: none;
    }

    .err {
      color: #e63946;
      font-size: .8rem;
      margin: -4px 0 4px 4px;
      min-height: 14px;
      display: block;
    }

    input.invalid {
      border-color: #e63946;
      background: #fff5f5;
    }

    @media (max-width: 720px) {
      .main {
        flex-direction: column-reverse;
      }

      .left,
      .right {
        width: 100%;
      }

      .right {
        padding: 30px 20px;
      }

      .right img {
        width: 120px;
      }

      .left {
        padding: 35px 28px;
      }
    }
  </style>
</head>

      <div class="left">
        
        <!-- LOGIN -->
        <form id="loginForm" novalidate onsubmit="return login(event)">
          <h2>Welcome back</h2>
          <p class="sub">Sign in to continue shopping</p>

          <input type="email" placeholder="Email ID" id="loginEmail" name="loginEmail" required>
          <span class="err" id="err_loginEmail"></span>

          <input type="password" placeholder="Password" id="loginPassword" name="loginPassword" required>
          <span class="err" id="err_loginPassword"></span>

          <select id="loginRole" name="loginRole">
            <option value="user">Login as User</option>
            <option value="admin">Login as Admin</option>
          </select>

          <button type="submit" class="primary">SIGN IN</button>

          <div class="toggle">
            New here? <span onclick="showRegister()">Create an account</span>
          </div>
        </form>

        <!-- REGISTER -->
        <form id="registerForm" class="hidden" novalidate onsubmit="return register(event)">
          <h2>Create account</h2>
          <p class="sub">Join ShopEase in seconds</p>

          <input type="text" placeholder="Full Name" id="name" name="name" required>
          <span class="err" id="err_name"></span>

          <input type="email" placeholder="Email ID" id="email" name="email" required>
          <span class="err" id="err_email"></span>

          <input type="tel" placeholder="Mobile Number (10 digits)" id="mobile" name="mobile"
                 pattern="[6-9][0-9]{9}" maxlength="10" required>
          <span class="err" id="err_mobile"></span>

          <input type="password" placeholder="Password (min 6 chars)" id="password" name="password"
                 minlength="6" required>
          <span class="err" id="err_password"></span>

          <button type="submit" class="primary">REGISTER</button>

          <div class="toggle">
            Already have an account? <span onclick="showLogin()">Sign in</span>
          </div>
        </form>

  <script>
    // Patterns
    const emailRe  = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
    const mobileRe = /^[6-9][0-9]{9}$/;
    const nameRe   = /^[A-Za-z][A-Za-z\s]{1,49}$/;

    function setErr(id, msg) {
      const inp = document.getElementById(id);
      const err = document.getElementById("err_" + id);
      if (msg) {
        inp.classList.add("invalid");
        err.textContent = msg;
      } else {
        inp.classList.remove("invalid");
        err.textContent = "";
      }
    }

    function clearAll(form) {
      form.querySelectorAll("input").forEach(i => {
        i.classList.remove("invalid");
        const e = document.getElementById("err_" + i.id);
        if (e) e.textContent = "";
      });
    }

    function showRegister() {
      document.getElementById("loginForm").classList.add("hidden");
      document.getElementById("registerForm").classList.remove("hidden");
    }
    function showLogin() {
      document.getElementById("registerForm").classList.add("hidden");
      document.getElementById("loginForm").classList.remove("hidden");
    }

    // Live validation
    document.addEventListener("input", (e) => {
      if (e.target.tagName === "INPUT") validateField(e.target.id);
    });

    function validateField(id) {
      const v = (document.getElementById(id)?.value || "").trim();
      switch (id) {
        case "loginEmail":
        case "email":
          if (!v) return setErr(id, "Email is required");
          if (!emailRe.test(v)) return setErr(id, "Enter a valid email");
          return setErr(id, "");
        case "loginPassword":
          if (!v) return setErr(id, "Password is required");
          return setErr(id, "");
        case "password":
          if (!v) return setErr(id, "Password is required");
          if (v.length < 6) return setErr(id, "Min 6 characters");
          return setErr(id, "");
        case "name":
          if (!v) return setErr(id, "Name is required");
          if (!nameRe.test(v)) return setErr(id, "Only letters & spaces, 2–50 chars");
          return setErr(id, "");
        case "mobile":
          if (!v) return setErr(id, "Mobile is required");
          if (!mobileRe.test(v)) return setErr(id, "Enter 10 digits, starting 6-9");
          return setErr(id, "");
      }
    }


    // ── Backend API base URL ──
    const API = 'https://shopease1-backend-vit4.onrender.com/api';

    async function login(ev) {
      ev.preventDefault();
      clearAll(document.getElementById("loginForm"));
      ["loginEmail", "loginPassword"].forEach(validateField);
      const bad = document.querySelectorAll("#loginForm input.invalid").length
                || !document.getElementById("loginEmail").value
                || !document.getElementById("loginPassword").value;
      if (bad) {
        ["loginEmail", "loginPassword"].forEach(validateField);
        return false;
      }

      const btn = ev.target.querySelector('button[type=submit]') || ev.target.querySelector('.primary');
      const origText = btn ? btn.textContent : '';
      if (btn) { btn.textContent = 'Signing in...'; btn.disabled = true; }

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById("loginEmail").value.trim(),
            password: document.getElementById("loginPassword").value,
          })
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.message || 'Login failed. Please check your credentials.');
          if (btn) { btn.textContent = origText; btn.disabled = false; }
          return false;
        }
        // Save JWT and user to localStorage
        localStorage.setItem('shopease_token', data.data.token);
        localStorage.setItem('shopease_user',  JSON.stringify(data.data.user));

        const role = document.getElementById("loginRole").value;
        if (role === 'admin' && data.data.user.role !== 'admin') {
          alert('You do not have admin privileges.');
          localStorage.removeItem('shopease_token');
          localStorage.removeItem('shopease_user');
          if (btn) { btn.textContent = origText; btn.disabled = false; }
          return false;
        }
        window.location.href = data.data.user.role === 'admin' ? 'admin_v2.html' : 'user_v4.html';
      } catch (err) {
        alert('Cannot connect to server. Make sure the backend is running on port 5000.');
        if (btn) { btn.textContent = origText; btn.disabled = false; }
      }
      return false;
    }

    async function register(ev) {
      ev.preventDefault();
      clearAll(document.getElementById("registerForm"));
      ["name", "email", "mobile", "password"].forEach(validateField);
      const bad = document.querySelectorAll("#registerForm input.invalid").length
                || !document.getElementById("name").value
                || !document.getElementById("email").value
                || !document.getElementById("mobile").value
                || !document.getElementById("password").value;
      if (bad) {
        ["name", "email", "mobile", "password"].forEach(validateField);
        return false;
      }

      const btn = ev.target.querySelector('button[type=submit]') || ev.target.querySelector('.primary');
      const origText = btn ? btn.textContent : '';
      if (btn) { btn.textContent = 'Creating account...'; btn.disabled = true; }

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name:     document.getElementById("name").value.trim(),
            email:    document.getElementById("email").value.trim(),
            mobile:   document.getElementById("mobile").value.trim(),
            password: document.getElementById("password").value,
          })
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.message || 'Registration failed.');
          if (btn) { btn.textContent = origText; btn.disabled = false; }
          return false;
        }
        alert('Account created successfully! Please sign in.');
        showLogin();
        document.getElementById("registerForm").reset();
      } catch (err) {
        alert('Cannot connect to server. Make sure the backend is running on port 5000.');
      }
      if (btn) { btn.textContent = origText; btn.disabled = false; }
      return false;
    }

    // Restrict mobile to digits only
    document.addEventListener("DOMContentLoaded", () => {
      const mob = document.getElementById("mobile");
      if (mob) mob.addEventListener("input", () => {
        mob.value = mob.value.replace(/\D/g, "").slice(0, 10);
      });
      // Redirect if already logged in
      const token = localStorage.getItem('shopease_token');
      const user  = JSON.parse(localStorage.getItem('shopease_user') || 'null');
      if (token && user) {
        window.location.href = user.role === 'admin' ? 'admin_v2.html' : 'user_v4.html';
      }
    });
  </script>
